<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMonitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>CloudMonitor</h1>
    <p>Monitoreo inteligente para infraestructuras multicloud</p>
</header>

<section>
    <h2>Características</h2>

    <div class="cards">

        <div class="card">
            <h3>Monitoreo en Tiempo Real</h3>
            <p>Visualización instantánea de métricas.</p>
        </div>

        <div class="card">
            <h3>Alertas Inteligentes</h3>
            <p>Notificaciones automáticas ante incidentes.</p>
        </div>

        <div class="card">
            <h3>Dashboard Centralizado</h3>
            <p>Control de todos tus servicios cloud.</p>
        </div>

    </div>
</section>

<section>
    <h2>Contacto</h2>

    <form id="contactForm">

        <input type="text" id="nombre" placeholder="Nombre">

        <input type="email" id="correo" placeholder="Correo">

        <textarea id="mensaje" placeholder="Mensaje"></textarea>

        <button type="submit">Enviar</button>

    </form>
</section>

<script src="script.js"></script>

</body>
</html>
